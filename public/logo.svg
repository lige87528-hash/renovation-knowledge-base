<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" width="520" height="320">
  <!-- Background shapes -->
  <rect x="40" y="60" width="440" height="220" rx="16" fill="#EEF2FF" opacity="0.6"/>
  <rect x="60" y="80" width="400" height="180" rx="12" fill="#E0E7FF" opacity="0.5"/>

  <!-- Main building/house -->
  <rect x="100" y="100" width="320" height="150" rx="8" fill="#3B82F6"/>
  <polygon points="260,40 100,100 420,100" fill="#2563EB"/>
  <polygon points="260,50 110,100 260,75" fill="#1D4ED8" opacity="0.3"/>

  <!-- Windows -->
  <rect x="130" y="130" width="55" height="45" rx="4" fill="#BFDBFE"/>
  <line x1="157" y1="130" x2="157" y2="175" stroke="#3B82F6" stroke-width="2"/>
  <line x1="130" y1="152" x2="185" y2="152" stroke="#3B82F6" stroke-width="2"/>

  <rect x="205" y="130" width="55" height="45" rx="4" fill="#BFDBFE"/>
  <line x1="232" y1="130" x2="232" y2="175" stroke="#3B82F6" stroke-width="2"/>
  <line x1="205" y1="152" x2="260" y2="152" stroke="#3B82F6" stroke-width="2"/>

  <!-- Door -->
  <rect x="290" y="145" width="50" height="80" rx="4" fill="#1E40AF"/>
  <rect x="300" y="155" width="30" height="25" rx="2" fill="#BFDBFE" opacity="0.5"/>
  <circle cx="330" cy="190" r="4" fill="#FBBF24"/>

  <!-- Knowledge documents / checkmarks -->
  <rect x="370" y="120" width="60" height="70" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"/>
  <line x1="382" y1="140" x2="418" y2="140" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="382" y1="152" x2="410" y2="152" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="382" y1="164" x2="405" y2="164" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <!-- Checkmark -->
  <path d="M385 176 L390 181 L400 171" stroke="#22C55E" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Tools -->
  <g transform="translate(140, 230)">
    <rect x="0" y="0" width="80" height="30" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
    <text x="40" y="20" text-anchor="middle" font-size="13" fill="#92400E" font-family="sans-serif" font-weight="600">335 篇文章</text>
  </g>
  <g transform="translate(250, 230)">
    <rect x="0" y="0" width="100" height="30" rx="6" fill="#FFFFFF" stroke="#22C55E" stroke-width="2"/>
    <text x="50" y="20" text-anchor="middle" font-size="13" fill="#166534" font-family="sans-serif" font-weight="600">覆盖全工种</text>
  </g>
</svg>
