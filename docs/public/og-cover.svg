    <polygon points="100,0 0,80 200,80" fill="#fff" opacity="0.2"/>
    <rect x="70" y="130" width="60" height="90" rx="4" fill="#fff" opacity="0.2"/>
    <rect x="20" y="105" width="40" height="35" rx="3" fill="#fff" opacity="0.15"/>
